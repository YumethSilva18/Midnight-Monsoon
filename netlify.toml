[build]
  # Set base directory to frontend subfolder
  base = "frontend"
  
  # Build command (runs from frontend directory)
  command = "npm ci && npm run build"
  
  # Publish directory (relative to base)
  publish = "dist"

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set Node version
[build.environment]
  NODE_VERSION = "18"
