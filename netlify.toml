[build]
  # Build command
  command = "cd frontend && npm install && npm run build"
  
  # Directory where the build output is generated
  publish = "frontend/dist"

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Set Node version
[build.environment]
  NODE_VERSION = "18"
