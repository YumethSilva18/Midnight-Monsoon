[build]
  # Directory where your frontend code is located
  base = "frontend"
  
  # Build command
  command = "npm run build"
  
  # Directory where the build output is generated
  publish = "dist"

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Set Node version
[build.environment]
  NODE_VERSION = "18"
